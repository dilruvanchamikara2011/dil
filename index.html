<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Downloader</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:12px;
max-width:420px;
margin:auto;
}

input{
width:100%;
padding:10px;
border:none;
border-radius:6px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:red;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.thumbnail{
width:100%;
margin-top:15px;
border-radius:10px;
}

.loader{
display:none;
margin-top:15px;
}
</style>
</head>

<body>

<div class="box">

<h2>🎥 YouTube Downloader</h2>

<input id="url" placeholder="Paste YouTube Link">

<button onclick="getVideo()">Get Video</button>

<div class="loader" id="loader">⏳ Loading...</div>

<div id="result"></div>

</div>

<script>

async function getVideo(){

let url=document.getElementById("url").value;

document.getElementById("loader").style.display="block";

let api="https://apis.xcasper.space/api/downloader/yt-dl3?url="+encodeURIComponent(url);

let res=await fetch(api);
let data=await res.json();

console.log(data);

document.getElementById("loader").style.display="none";

let title=data.title || "";
let thumb=data.thumbnail || "";
let download="";

if(data.links){
download=data.links[0].url;
}

document.getElementById("result").innerHTML=`

<img src="${thumb}" class="thumbnail">

<h3>${title}</h3>

<a href="${download}" download>

<button>⬇ Download Video</button>

</a>

`;

}

</script>

</body>
</html>
