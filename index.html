<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Downloader</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

input{
width:90%;
padding:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
margin-top:10px;
background:red;
color:white;
border:none;
border-radius:5px;
}

img{
width:100%;
margin-top:15px;
border-radius:10px;
}
</style>

</head>
<body>

<h2>YouTube Downloader</h2>

<div class="container">

<input id="url" placeholder="Paste YouTube URL">

<br>

<button onclick="getVideo()">Get Video</button>

<div id="result"></div>

</div>

<script>

async function getVideo(){

let url=document.getElementById("url").value;

let api="https://apis.xcasper.space/api/downloader/yt-dl3?url="+encodeURIComponent(url);

let res=await fetch(api);
let data=await res.json();

console.log(data);

let thumb=data.thumbnail || "";
let title=data.title || "Video";

let downloadLink="";

if(data.download){
downloadLink=data.download;
}else if(data.result){
downloadLink=data.result.url;
}

document.getElementById("result").innerHTML=`
<img src="${thumb}">
<h3>${title}</h3>
<a href="${downloadLink}">
<button>Download Video</button>
</a>
`;

}

</script>

</body>
</html>
