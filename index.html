<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Downloader</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e293b;
padding:20px;
border-radius:12px;
width:90%;
max-width:420px;
text-align:center;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:red;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#cc0000;
}

.thumbnail{
width:100%;
border-radius:10px;
margin-top:15px;
}

.loader{
border:4px solid #ddd;
border-top:4px solid red;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:20px auto;
display:none;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="box">

<h2>🎥 YouTube Downloader</h2>

<input type="text" id="url" placeholder="Paste YouTube Link">

<button onclick="getVideo()">Get Video</button>

<div class="loader" id="loader"></div>

<div id="result"></div>

</div>

<script>

async function getVideo(){

let url=document.getElementById("url").value;

if(!url){
alert("Paste YouTube Link");
return;
}

document.getElementById("loader").style.display="block";
document.getElementById("result").innerHTML="";

let api="https://apis.xcasper.space/api/downloader/yt-dl3?url="+encodeURIComponent(url);

try{

let res=await fetch(api);
let data=await res.json();

console.log(data);

document.getElementById("loader").style.display="none";

let title=data.title || "Video";
let thumb=data.thumbnail || "";
let download=data.download || data.url || "";

document.getElementById("result").innerHTML=`

<img src="${thumb}" class="thumbnail">

<h3>${title}</h3>

<a href="${download}" target="_blank">

<button>⬇ Download Video</button>

</a>

`;

}catch(e){

document.getElementById("loader").style.display="none";

document.getElementById("result").innerHTML="❌ Error loading video";

}

}

</script>

</body>
</html>
